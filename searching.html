<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>進路図書貸出アプリ【蔵書検索】</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
    body, html { margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; background-color: #f4f4f4; color: #333; line-height: 1.6; font-size: 16px; scroll-behavior: smooth; }
    .container { padding: 20px; background-color: #fff; width: 100%; max-width: 600px; margin: 0 auto; min-height: 100vh; box-sizing: border-box; }
    .header-info { font-size: 14px; color: #666; text-align: center; margin-bottom: 10px; }
    h1 { text-align: center; color: #0056b3; margin-bottom: 30px; border-bottom: 4px solid #eee; padding-bottom: 20px; font-size: 24px; }
    
    .form-group { margin-bottom: 25px; }
    label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 18px; }
    input[type="text"] { width: 100%; padding: 12px; border: 2px solid #aaa; border-radius: 10px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
    
    .button-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    button { color: white; padding: 15px 20px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; background-color: #0056b3; flex: 1; }
    .btn-action { width: 100%; background-color: #28a745; font-size: 20px; padding: 20px; margin-top: 10px; }
    #reset-button { width: 100%; background-color: #6c757d; font-size: 18px; padding: 15px; margin-top: 5px; }
    
    /* 検索結果テーブルのスタイル */
    .result-area { margin-top: 30px; }
    .result-count { font-weight: bold; margin-bottom: 10px; color: #666; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    th { background-color: #0056b3; color: white; padding: 12px 8px; text-align: left; }
    td { border-bottom: 1px solid #eee; padding: 12px 8px; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    
    .status-badge { padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 12px; }
    .status-available { background-color: #d4edda; color: #155724; }
    .status-loaned { background-color: #f8d7da; color: #721c24; }

    .status-message { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-size: 16px; font-weight: bold; }
    .hidden { display: none; }
    .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    button:disabled { background-color: #ccc !important; cursor: not-allowed; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-info">千葉県立幕張総合高等学校 進路指導部</div>
    <h1>進路図書貸出アプリ<br>【蔵書検索】</h1>
    
    <div class="form-group">
      <label for="search-input">書籍名キーワード：</label>
      <input type="text" id="search-input" placeholder="タイトルの一部を入力">
    </div>

    <div class="button-container">
      <button id="search-button" class="btn-action">検索を実行する</button>
      <button id="reset-button">クリア</button>
    </div>

    <div id="status-message" class="status-message hidden"></div>

    <div id="result-area" class="result-area hidden">
      <div id="result-count" class="result-count"></div>
      <table>
        <thead>
          <tr>
            <th style="width: 25%;">蔵書ID</th>
            <th>書籍名</th>
            <th style="width: 25%;">状況</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    // デプロイしたウェブアプリのURL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxHBRfKm0RQeYvnTq09BYYL6emsOk3--Wdjiq5gPwE28R5R_fziIVND35iK-3lHmK7CGg/exec";

    const searchInput = document.getElementById('search-input');
    const searchButton = document.getElementById('search-button');
    const resetButton = document.getElementById('reset-button');
    const resultArea = document.getElementById('result-area');
    const resultBody = document.getElementById('result-body');
    const resultCount = document.getElementById('result-count');
    const statusMsg = document.getElementById('status-message');

    searchButton.addEventListener('click', executeSearch);
    resetButton.addEventListener('click', resetForm);

    async function executeSearch() {
      const keyword = searchInput.value.trim();
      if (!keyword) {
        showStatus('キーワードを入力してください', 'error');
        return;
      }

      // 準備
      setButtonsDisabled(true);
      showStatus('検索中...', '');
      resultArea.classList.add('hidden');
      resultBody.innerHTML = '';

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'searchBooks', keyword: keyword })
        });
        const res = await response.json();

        if (res.success) {
          displayResults(res.data);
          showStatus('', ''); // メッセージを隠す
          statusMsg.classList.add('hidden');
        } else {
          showStatus(res.message, 'error');
        }
      } catch (e) {
        showStatus('通信エラーが発生しました', 'error');
      } finally {
        setButtonsDisabled(false);
      }
    }

    function displayResults(data) {
      if (data.length === 0) {
        showStatus('該当する書籍が見つかりませんでした', 'error');
        return;
      }

      resultCount.textContent = `検索結果: ${data.length} 件`;
      
      data.forEach(book => {
        const row = resultBody.insertRow();
        const statusClass = book.status === '在庫有' ? 'status-available' : 'status-loaned';
        
        row.innerHTML = `
          <td>${book.id}</td>
          <td>${book.title}</td>
          <td><span class="status-badge ${statusClass}">${book.status}</span></td>
        `;
      });

      resultArea.classList.remove('hidden');
      resultArea.scrollIntoView({ behavior: 'smooth' });
    }

    function setButtonsDisabled(isDisabled) {
      searchButton.disabled = isDisabled;
      resetButton.disabled = isDisabled;
    }

    function showStatus(msg, type) {
      if (!msg) {
        statusMsg.classList.add('hidden');
        return;
      }
      statusMsg.textContent = msg;
      statusMsg.className = 'status-message ' + type;
      statusMsg.classList.remove('hidden');
    }

    function resetForm() {
      searchInput.value = '';
      resultArea.classList.add('hidden');
      showStatus('', '');
      statusMsg.classList.add('hidden');
      searchInput.focus();
    }
  </script>
</body>
</html>
