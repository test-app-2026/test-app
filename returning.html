<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>進路図書貸出アプリ【返却】</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
    
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #f4f4f4;
      color: #333;
      line-height: 1.6;
      font-size: 16px;
      scroll-behavior: smooth;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    .header-info {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-bottom: 10px;
    }
    
    h1 {
      color: #0056b3;
      text-align: center;
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 24px;
      border-bottom: 3px solid #eee;
      padding-bottom: 10px;
    }
    
    .section {
      margin-bottom: 20px;
      padding: 15px;
      border: 2px solid #eee;
      border-radius: 8px;
    }
    
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      margin-bottom: 15px;
    }
    
    button {
      width: 100%;
      padding: 15px;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.2s;
    }
    
    .btn-blue { background-color: #007bff; }
    .btn-green { background-color: #28a745; }
    .btn-gray { background-color: #6c757d; }
    .btn-red { background-color: #dc3545; }
    
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    .scanner-box {
      width: 100%;
      height: 250px;
      background: #000;
      margin-top: 5px;
      margin-bottom: 15px;
      display: none;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    
    .scanner-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) contrast(150%);
    }
    
    #message {
      margin: 20px 0;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      white-space: pre-wrap;
    }
    
    .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    
    .book-card {
      background: #f8f9fa;
      border: 1px solid #ddd;
      padding: 15px;
      margin-top: 15px;
      border-radius: 8px;
      position: relative;
    }
    
    .remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ff4d4d;
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 10px; /* 文字サイズを小さく調整 */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }
    
    .info-line {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }

    .footer-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-info">千葉県立幕張総合高等学校 進路指導部</div>
    <h1>進路図書貸出アプリ<br>【返却ページ】</h1>

    <div class="section">
      <label>返却図書の蔵書IDを確認</label>
      <button class="btn-blue" id="scan-btn" onclick="toggleScanner()">バーコードをスキャン</button>
      <div id="scanner-container" class="scanner-box"></div>
      
      <input type="text" id="book-id" placeholder="蔵書IDをスキャンまたは入力してください" onkeypress="if(event.key==='Enter') handleBookInput(this.value)">
      <button class="btn-gray" id="search-btn" onclick="handleBookInput(document.getElementById('book-id').value)">貸出記録検索</button>
    </div>

    <div id="return-list-section" style="display:none;">
      <label>返却リスト</label>
      <div id="book-list"></div>
      <button id="submit-btn" class="btn-green" style="margin-top:20px;" onclick="submitReturn()">返却処理を実行</button>
    </div>

    <div id="message"></div>

    <div class="footer-btns">
      <button class="btn-gray" id="reset-button" onclick="resetForm()">リセット</button>
      <button class="btn-red" id="close-button" onclick="window.close()">閉じる</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxHBRfKm0RQeYvnTq09BYYL6emsOk3--Wdjiq5gPwE28R5R_fziIVND35iK-3lHmK7CGg/exec";
    let returnQueue = [];
    let isScanning = false;

    async function callGas(action, data) {
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action, ...data })
        });
        return await response.json();
      } catch (e) {
        return { success: false, message: "ネットワークエラー" };
      }
    }

    function toggleScanner() {
      const box = document.getElementById('scanner-container');
      const btn = document.getElementById('scan-btn');
      
      if (isScanning) {
         Quagga.stop();
        box.style.display = 'none';
        btn.innerText = "バーコードをスキャン";
        isScanning = false;
      } else {
        box.style.display = 'block';
        btn.innerText = "スキャン停止";
        isScanning = true;
        initQuagga();
      }
    }

    function initQuagga() {
      Quagga.init({
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.querySelector('#scanner-container'),
          constraints: { width: 1280, height: 720, facingMode: "environment" }
        },
        decoder: { readers: ["code_128_reader", "ean_reader", "codabar_reader"] },
        locate: true
      }, (err) => {
        if (err) {
          alert("カメラ起動エラー: " + err);
          toggleScanner();
          return;
        }
        Quagga.start();
      });

      Quagga.onDetected((data) => {
        const code = data.codeResult.code;
        if (code) {
          Quagga.stop();
          document.getElementById('book-id').value = code;
          handleBookInput(code);
          const box = document.getElementById('scanner-container');
          const btn = document.getElementById('scan-btn');
          box.style.display = 'none';
          btn.innerText = "バーコードをスキャン";
          isScanning = false;
        }
      });
    }

    async function handleBookInput(bookId) {
      if (!bookId) return;

      // 前後のアルファベットを削除
      bookId = bookId.replace(/^[a-zA-Z]+|[a-zA-Z]+$/g, '');
      document.getElementById('book-id').value = bookId;

      if (returnQueue.find(b => b.bookId === bookId)) {
        setMessage("この本は既にリストにあります", "error");
        return;
      }

      setMessage("貸出記録を確認中...", "");
      
      const res = await callGas('getUnreturnedBooksByBookId', { bookId: bookId });

      if (res.success && res.data) {
        const nameValue = res.data.userName || res.data.name || res.data.利用者名 || "不明な利用者";
        
        returnQueue.push({
          bookId: bookId,
          bookTitle: res.data.bookTitle,
          userName: nameValue,
          dueDate: res.data.dueDate
        });
        updateListUI();
        setMessage("リストに追加しました", "success");
        document.getElementById('book-id').value = "";
        autoScroll('submit-btn');
      } else {
        setMessage(res.message || "貸出中のではないか、記録が見つかりません", "error");
      }
    }

    function updateListUI() {
      const listDiv = document.getElementById('book-list');
      const section = document.getElementById('return-list-section');
      
      if (returnQueue.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      listDiv.innerHTML = returnQueue.map((b, index) => `
        <div class="book-card">
          <button class="remove-btn" onclick="removeFromQueue(${index})">取消</button>
          <strong>📖 ${b.bookTitle}</strong>
          <div class="info-line">蔵書ID: ${b.bookId}</div>
          <div class="info-line">利用者: ${b.userName} さん</div>
          <div class="info-line">返返期限: ${b.dueDate}</div>
        </div>
      `).join('');
    }

    function removeFromQueue(index) {
      returnQueue.splice(index, 1);
      updateListUI();
    }

    async function submitReturn() {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      setMessage("返却処理を実行中...", "");

      const bookIds = returnQueue.map(b => b.bookId);
      const res = await callGas('processBulkReturn', { bookIds: bookIds });

      if (res.success) {
        setMessage(res.message, "success");
        returnQueue = [];
        updateListUI();
        autoScroll('close-button');
      } else {
        setMessage("エラー: " + res.message, "error");
        btn.disabled = false;
      }
    }

    function resetForm() { location.reload(); }
    function setMessage(text, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.innerText = text;
      msgDiv.className = type;
    }
    function autoScroll(id) {
      setTimeout(() => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
  </script>
</body>
</html>
