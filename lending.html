<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>進路図書貸出アプリ【貸出】</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- ライブラリ読み込み -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
    
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      font-size: 24px;
      line-height: 1.6;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    .header-info {
      font-size: 18px;
      color: #666;
      text-align: center;
      margin-bottom: 5px;
    }
    
    h1 {
      color: #0056b3;
      text-align: center;
      margin-top: 0;
      margin-bottom: 40px;
      font-size: 36px;
      border-bottom: 4px solid #eee;
      padding-bottom: 10px;
    }
    
    .section {
      margin-bottom: 30px;
      padding: 25px;
      border: 3px solid #eee;
      border-radius: 12px;
      transition: opacity 0.3s;
    }
    
    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 15px;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 20px;
      font-size: 24px;
      border: 2px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 15px;
    }
    
    button {
      width: 100%;
      padding: 20px;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
      transition: background 0.2s;
    }
    
    .btn-blue { background-color: #007bff; }
    .btn-green { background-color: #28a745; }
    .btn-gray { background-color: #6c757d; }
    .btn-red { background-color: #dc3545; }
    
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    /* スキャナー表示領域 */
    .scanner-box {
      width: 100%;
      height: 300px;
      background: #000;
      margin-top: 10px;
      display: none;
      position: relative;
      overflow: hidden;
      border-radius: 10px;
    }
    
    /* 読取精度向上のためのフィルタ適用 */
    .scanner-box video, .scanner-box canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) contrast(150%);
    }
    
    #message {
      margin: 30px 0;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      font-size: 22px;
    }
    
    .success { background-color: #d4edda; color: #155724; }
    .error { background-color: #f8d7da; color: #721c24; }
    
    .list-item {
      background: #f8f9fa;
      padding: 15px;
      margin-top: 10px;
      border-radius: 6px;
      border-left: 8px solid #007bff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .user-display {
      background: #e7f3ff;
      padding: 15px;
      border-radius: 8px;
      color: #0056b3;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .footer-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-info">千葉県立幕張総合高等学校 進路指導部</div>
    <h1>進路図書貸出アプリ<br>【貸出ページ】</h1>
    
    <div class="section" id="user-section">
      <label>1. 利用者IDを入力またはスキャン</label>
      <button class="btn-blue" id="scan-user-btn" onclick="toggleUserScanner()">QRコードをスキャン</button>
      <div id="user-scanner-container" class="scanner-box">
        <canvas id="qr-canvas" hidden></canvas>
      </div>
      <input type="text" id="user-id" placeholder="利用者ID" onkeypress="if(event.key==='Enter') handleUserInput(this.value)">
      <button class="btn-gray" onclick="handleUserInput(document.getElementById('user-id').value)">検索</button>
      <div id="user-info-display" class="user-display" style="display:none;"></div>
    </div>

    <div class="section disabled" id="book-section">
      <label>2. 蔵書IDを入力またはスキャン</label>
      <button class="btn-blue" id="scan-book-btn" onclick="toggleBookScanner()">バーコードをスキャン</button>
      <div id="book-scanner-container" class="scanner-box"></div>
      <input type="text" id="book-id" placeholder="蔵書ID" onkeypress="if(event.key==='Enter') handleBookInput(this.value)">
      <button class="btn-gray" onclick="handleBookInput(document.getElementById('book-id').value)">追加</button>
      <div id="book-list"></div>
    </div>

    <button class="btn-green" id="submit-btn" onclick="submitLending()" disabled>貸出を実行する</button>
    
    <div id="message"></div>

    <div class="footer-btns">
      <button class="btn-gray" onclick="resetForm()">リセット</button>
      <button class="btn-red" onclick="window.close()">閉じる</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxHBRfKm0RQeYvnTq09BYYL6emsOk3--Wdjiq5gPwE28R5R_fziIVND35iK-3lHmK7CGg/exec";
    let scannedBooks = [];
    let currentUser = null;
    let videoStream = null;
    let qrAnimationId = null;
    let isQuaggaRunning = false;

    async function callGas(action, data) {
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action, ...data })
        });
        return await response.json();
      } catch (e) {
        return { success: false, message: "ネットワークエラー" };
      }
    }

    async function toggleUserScanner() {
      const container = document.getElementById('user-scanner-container');
      const canvas = document.getElementById('qr-canvas');
      const btn = document.getElementById('scan-user-btn');

      if (videoStream) {
        stopUserScanner();
        return;
      }

      if (isQuaggaRunning) stopBookScanner();

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        videoStream = stream;
        const video = document.createElement("video");
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        
        container.style.display = 'block';
        canvas.hidden = false;
        btn.innerText = "スキャン停止";
        
        const ctx = canvas.getContext("2d");

        const tick = () => {
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
              inversionAttempts: "dontInvert",
            });
            if (code) {
              document.getElementById('user-id').value = code.data;
              handleUserInput(code.data);
              stopUserScanner();
              return;
            }
          }
          qrAnimationId = requestAnimationFrame(tick);
        };
        qrAnimationId = requestAnimationFrame(tick);
      } catch (err) {
        alert("カメラ起動エラー: " + err);
      }
    }

    function stopUserScanner() {
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
      if (qrAnimationId) cancelAnimationFrame(qrAnimationId);
      document.getElementById('user-scanner-container').style.display = 'none';
      document.getElementById('scan-user-btn').innerText = "QRコードをスキャン";
    }

    function toggleBookScanner() {
      if (isQuaggaRunning) {
        stopBookScanner();
        return;
      }
      if (videoStream) stopUserScanner();

      const container = document.getElementById('book-scanner-container');
      container.style.display = 'block';
      document.getElementById('scan-book-btn').innerText = "スキャン停止";

      Quagga.init({
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: container,
          constraints: { facingMode: "environment" }
        },
        decoder: { readers: ["code_128_reader", "ean_reader", "codabar_reader"] }
      }, (err) => {
        if (err) { alert(err); return; }
        Quagga.start();
        isQuaggaRunning = true;
      });

      Quagga.onDetected((data) => {
        const code = data.codeResult.code;
        if (code) {
          document.getElementById('book-id').value = code;
          handleBookInput(code);
          stopBookScanner();
        }
      });
    }

    function stopBookScanner() {
      Quagga.stop();
      isQuaggaRunning = false;
      document.getElementById('book-scanner-container').style.display = 'none';
      document.getElementById('scan-book-btn').innerText = "バーコードをスキャン";
    }

    async function handleUserInput(val) {
      if (!val) return;
      setMessage("利用者情報を確認中...", "");
      const res = await callGas('getUserInfo', { userId: val });
      
      if (res.success) {
        currentUser = { ...res, userId: val };
        const display = document.getElementById('user-info-display');
        display.innerText = `利用者: ${res.grade}年${res.class}組 ${res.name} さん`;
        display.style.display = 'block';
        document.getElementById('book-section').classList.remove('disabled');
        setMessage("利用者を確定しました。蔵書をスキャンしてください。", "success");
        autoScroll('book-section');
      } else {
        setMessage(res.message, "error");
      }
    }

    async function handleBookInput(val) {
      if (!val || !currentUser) return;
      if (scannedBooks.find(b => b.bookId === val)) {
        setMessage("既にリストにあります", "error");
        return;
      }

      setMessage("書籍情報を取得中...", "");
      const res = await callGas('getBookDetails', { bookId: val });
      
      if (res.success) {
        scannedBooks.push({ bookId: val, bookTitle: res.title });
        updateBookList();
        document.getElementById('book-id').value = "";
        setMessage("書籍を追加しました", "success");
        checkReady();
        autoScroll('submit-btn');
      } else {
        setMessage(res.message, "error");
      }
    }

    function updateBookList() {
      const list = document.getElementById('book-list');
      list.innerHTML = scannedBooks.map(b => `
        <div class="list-item">
          <span>📖 ${b.bookTitle}</span>
          <small>(${b.bookId})</small>
        </div>
      `).join('');
    }

    function checkReady() {
      document.getElementById('submit-btn').disabled = !(scannedBooks.length > 0 && currentUser);
    }

    async function submitLending() {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      setMessage("貸出を登録中...", "");

      const bulkData = scannedBooks.map(b => ({ ...b, ...currentUser }));
      const res = await callGas('processBulkLending', { bulkData });

      if (res.success) {
        setMessage(res.message, "success");
        scannedBooks = [];
        updateBookList();
        document.getElementById('user-info-display').style.display = 'none';
        document.getElementById('book-section').classList.add('disabled');
        document.getElementById('user-id').value = "";
        autoScroll('close-button');
      } else {
        setMessage("エラー: " + res.message, "error");
        btn.disabled = false;
      }
    }

    function resetForm() { location.reload(); }
    function setMessage(text, type) {
      const m = document.getElementById('message');
      m.innerText = text;
      m.className = type;
    }
    function autoScroll(id) {
      setTimeout(() => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
  </script>
</body>
</html>
