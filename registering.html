<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>進路図書貸出アプリ【蔵書登録】</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
    body, html { margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; background-color: #f4f4f4; color: #333; line-height: 1.6; font-size: 16px; scroll-behavior: smooth; }
    .container { padding: 20px; background-color: #fff; width: 100%; max-width: 600px; margin: 0 auto; min-height: 100vh; box-sizing: border-box; }
    .header-info { font-size: 14px; color: #666; text-align: center; margin-bottom: 10px; }
    h1 { text-align: center; color: #0056b3; margin-bottom: 30px; border-bottom: 4px solid #eee; padding-bottom: 20px; font-size: 24px; }
    
    #camera-view { position: relative; width: 100%; margin: 20px auto; border: 4px solid #0056b3; border-radius: 15px; background-color: #000; overflow: hidden; aspect-ratio: 1 / 1; }
    #camera-view > video, #camera-view > canvas { width: 100%; height: 100%; object-fit: cover; }
    .scan-guide { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }
    .scan-guide::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 30%; border: 3px dashed #dc3545; border-radius: 8px; box-shadow: 0 0 0 3000px rgba(0, 0, 0, 0.5); }

    .form-group { margin-bottom: 25px; }
    label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 18px; }
    input[type="text"] { width: 100%; padding: 12px; border: 2px solid #aaa; border-radius: 10px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
    
    #book-info { border: 3px solid #0056b3; border-radius: 20px; padding: 20px; margin-top: 40px; background-color: #f0f7ff; }
    #book-info h3 { margin-top: 0; color: #0056b3; font-size: 20px; text-align: center; margin-bottom: 20px; }
    
    .button-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .scan-buttons { display: flex; gap: 15px; }
    button { color: white; padding: 15px 20px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; background-color: #0056b3; flex: 1; }
    
    #search-button { background-color: #6c757d; margin-top: 10px; width: 100%; }
    .btn-action { width: 100%; background-color: #28a745; font-size: 20px; padding: 20px; margin-top: 10px; }
    
    #reset-button { width: 100%; background-color: #6c757d; font-size: 18px; padding: 15px; margin-top: 5px; }
    .btn-active { background-color: #dc3545 !important; }
    
    .status-message { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-size: 16px; font-weight: bold; }
    .hidden { display: none; }
    .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    #camera-view video {
      filter: contrast(150%) brightness(110%) grayscale(100%);
      object-fit: cover;
    }

    button:disabled {
      background-color: #ccc !important;
      cursor: not-allowed;
      opacity: 0.7;
    }
    
  </style>
</head>
<body>
  <div class="container">
    <div class="header-info">千葉県立幕張総合高等学校 進路指導部</div>
    <h1>進路図書貸出アプリ<br>【蔵書登録ページ】</h1>
    
    <div class="button-container">
      <div class="scan-buttons">
        <button id="bookid-scan-button">蔵書IDスキャン</button>
        <button id="isbn-scan-button">ISBNスキャン</button>
      </div>
    </div>
    
    <div id="camera-view" class="hidden"></div>
    
    <div id="manual-input-section">
      <div class="form-group">
        <label for="bookid-input">蔵書ID：</label>
        <input type="text" id="bookid-input" placeholder="スキャンまたは入力">
      </div>
      <div class="form-group">
        <label for="isbn-input">ISBN：</label>
        <input type="text" id="isbn-input" placeholder="スキャンまたは入力">
        <button id="search-button">書籍データを取得</button>
      </div>
    </div>
    
    <div id="book-info">
      <h3>書籍データ</h3>
      <div class="form-group"><label>ISBN：</label><input type="text" id="book-isbn" readonly style="background-color:#e9ecef;"></div>
      <div class="form-group"><label>書籍名：</label><input type="text" id="book-title"></div>
      <div class="form-group"><label>著者名：</label><input type="text" id="book-author"></div>
      <div class="form-group"><label>出版社：</label><input type="text" id="book-publisher"></div>
      <div class="form-group"><label>出版日：</label><input type="text" id="book-pubdate"></div>
      <div class="form-group"><label>備考：</label><input type="text" id="book-note"></div>
    </div>

    <div class="button-container">
      <button id="register-button" class="btn-action">蔵書登録を実行する</button>
      <button id="reset-button">リセット</button>
    </div>

    <div id="status-message" class="status-message hidden"></div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxHBRfKm0RQeYvnTq09BYYL6emsOk3--Wdjiq5gPwE28R5R_fziIVND35iK-3lHmK7CGg/exec";

    let isScanning = false;
    let scanTarget = null;

    document.addEventListener('DOMContentLoaded', function() {
      const bookidScanBtn = document.getElementById('bookid-scan-button');
      const isbnScanBtn = document.getElementById('isbn-scan-button');
      const cameraView = document.getElementById('camera-view');
      const bookidInput = document.getElementById('bookid-input');
      const isbnInput = document.getElementById('isbn-input');
      const searchButton = document.getElementById('search-button');
      const registerButton = document.getElementById('register-button');
      const resetButton = document.getElementById('reset-button');
      const bookInfoArea = document.getElementById('book-info');
      const statusMsgArea = document.getElementById('status-message');

      const resIsbn = document.getElementById('book-isbn');
      const resTitle = document.getElementById('book-title');
      const resAuthor = document.getElementById('book-author');
      const resPublisher = document.getElementById('book-publisher');
      const resPubdate = document.getElementById('book-pubdate');
      const resNote = document.getElementById('book-note');

      bookidScanBtn.addEventListener('click', () => toggleScanner('bookid'));
      isbnScanBtn.addEventListener('click', () => toggleScanner('isbn'));
      resetButton.addEventListener('click', resetForm);

      function toggleScanner(target) {
        if (isScanning) { 
          stopQuagga(); 
          if (scanTarget === target) return; 
        }
        startScanner(target);
      }

      function startScanner(target) {
        scanTarget = target; 
        isScanning = true;
        cameraView.classList.remove('hidden');
        if(target === 'bookid') {
          bookidScanBtn.textContent = '停止';
          bookidScanBtn.classList.add('btn-active');
        } else {
          isbnScanBtn.textContent = '停止';
          isbnScanBtn.classList.add('btn-active');
        }
        initQuagga();
      }

      function stopQuagga() {
        if (!isScanning) return;
        Quagga.stop(); 
        isScanning = false;
        cameraView.classList.add('hidden');
        bookidScanBtn.textContent = '蔵書IDスキャン';
        bookidScanBtn.classList.remove('btn-active');
        isbnScanBtn.textContent = 'ISBNスキャン';
        isbnScanBtn.classList.remove('btn-active');
        cameraView.innerHTML = '';
      }

      function initQuagga() {
        const isIsbn = (scanTarget === 'isbn');
        
        const config = {
          inputStream: { 
            name: "Live", 
            type: "LiveStream", 
            target: cameraView, 
            constraints: { 
              // ISBNは高解像度、bookidは処理速度優先
              width: isIsbn ? 1280 : 640,
              height: isIsbn ? 720 : 640,
              facingMode: "environment"
            },
            // 認識エリアを中央に絞って、余計な背景情報の計算をカット
            area: { top: "35%", right: "10%", left: "10%", bottom: "35%" }
          },
          locator: {
            // ISBN(細い線)の時は詳細に、bookidの時は高速に
            patchSize: isIsbn ? "medium" : "small",
            halfSample: isIsbn ? false : true 
          },
          decoder: { 
            // 探す対象を1つに絞るのが一番速い
            readers: isIsbn ? ['ean_reader'] : ['codabar_reader', 'code_128_reader']
          },
          locate: true
        };

        Quagga.init(config, function(err) {
          if (err) { 
            showStatusMessage('カメラ起動失敗', 'error');
            stopQuagga(); 
            return; 
          }
          const guide = document.createElement('div');
          guide.className = 'scan-guide';
          cameraView.appendChild(guide);
          Quagga.start();
        });

        Quagga.onDetected(function(result) {
          // 信頼度しきい値。ISBNが遅い場合は0.5まで下げても良い
          if (result.codeResult.confidence < 0.6) return;
          
          const code = result.codeResult.code;
          const format = result.codeResult.format;
          
          stopQuagga(); 

          if (scanTarget === 'bookid') {
            let finalId = code;
            if (format === 'codabar') {
              finalId = code.replace(/^[A-D]+|[A-D]+$/g, "");
            }
            bookidInput.value = finalId;
            showStatusMessage(`蔵書ID(${format})を取得しました`, 'success');
          } else {
            // ISBNの場合：978から始まる13桁であることを確認
            if (code.length === 13 && code.startsWith("978")) {
              isbnInput.value = code;
              fetchBookInfo(code);
            } else {
              // 読み取ったがISBNでない場合は再開
              startScanner('isbn');
            }
          }
        });
      }

      searchButton.addEventListener('click', () => {
        const isbn = isbnInput.value.trim();
        if (isbn) fetchBookInfo(isbn);
      });

      async function fetchBookInfo(isbn) {
        // 1. 検索開始：メッセージ表示、ボタン無効化、テキスト変更
        showStatusMessage('書籍データを検索中...', '');
        setButtonsDisabled(true); // 前回作成した関数で全ボタンを無効化
        searchButton.textContent = '書籍データを取得中...'; // ボタンの文字を変更
            
        try {
          const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'fetchBookInfo', isbn: isbn })
          });
          const book = await response.json();
      
          if (book && !book.error) {
            bookInfoArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            resIsbn.value = book.isbn || isbn;
            resTitle.value = book.title || "";
            resAuthor.value = book.authors || "";
            resPublisher.value = book.publisher || "";
            resPubdate.value = book.pubdate || "";
            showStatusMessage('書籍データを取得しました', 'success');
            } else {
            showStatusMessage(book.error || '書籍データが見つかりません', 'error');
            statusMsgArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            resIsbn.value = isbn;
          }
        } catch (e) {
          showStatusMessage('通信エラー', 'error');
          statusMsgArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } finally {
          // 2. 検索終了（成功・失敗に関わらず実行）：ボタン有効化、テキストを元に戻す
          setButtonsDisabled(false); 
          searchButton.textContent = '書籍データを取得'; // 元の文字に戻す
        }
      }

      registerButton.addEventListener('click', async function() {
        statusMsgArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
        const data = {
          bookid: bookidInput.value.trim(),
          isbn: resIsbn.value.trim(),
          title: resTitle.value.trim(),
          author: resAuthor.value.trim(),
          publisher: resPublisher.value.trim(),
          pubdate: resPubdate.value.trim(),
          note: resNote.value.trim()
        };
        if (!data.title) { showStatusMessage('書籍名は必須です', 'error'); return; }
        showStatusMessage('登録中...', '');
        setButtonsDisabled(true);
        try {
          const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'registerBook', bookData: data })
          });
          const res = await response.json();
          if (res.success) {
            showStatusMessage(res.message, 'success');
          } else {
            showStatusMessage(res.message, 'error');
          }
        } catch (e) {
          showStatusMessage('登録エラー', 'error');
        }
      });

      function setButtonsDisabled(isDisabled) {
        const buttons = [
          document.getElementById('bookid-scan-button'),
          document.getElementById('isbn-scan-button'),
          document.getElementById('search-button'),
          document.getElementById('register-button')
        ];
        buttons.forEach(btn => {
          if (btn) btn.disabled = isDisabled;
        });
      }
      
      function resetForm() {
        bookidInput.value = ''; isbnInput.value = ''; resIsbn.value = '';
        resTitle.value = ''; resAuthor.value = ''; resPublisher.value = '';
        resPubdate.value = ''; resNote.value = '';
        setButtonsDisabled(false);
        showStatusMessage('リセットしました', '');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function showStatusMessage(msg, type) {
        const div = document.getElementById('status-message');
        div.textContent = msg;
        div.className = 'status-message ' + type;
        div.classList.remove('hidden');
      }
    });
  </script>
</body>

</html>
